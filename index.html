<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AES工具">
  <meta name="theme-color" content="#007aff">
  <title>AES 加解密工具 v2</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #007aff;
      --red: #ff3b30;
      --green: #34c759;
      --bg: #f2f2f7;
      --card: #ffffff;
      --text: #000000;
      --sub: #6c6c70;
      --border: #c6c6c8;
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1e;
        --card: #2c2c2e;
        --text: #ffffff;
        --sub: #98989f;
        --border: #3a3a3c;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
    }

    h1 {
      font-size: 17px;
      font-weight: 600;
      text-align: center;
      padding: 16px 0 4px;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--sub);
      text-align: center;
      padding-bottom: 20px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .card-label {
      font-size: 13px;
      color: var(--sub);
      padding: 10px 16px 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .seg {
      display: flex;
      background: var(--bg);
      border-radius: 9px;
      padding: 2px;
      margin: 12px 12px 14px;
    }
    .seg button {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--sub);
      font-size: 14px;
      font-weight: 500;
      padding: 7px 0;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .seg button.active {
      background: var(--blue);
      color: #ffffff;
      box-shadow: 0 1px 4px rgba(0,122,255,0.4);
    }

    input[type=password], input[type=text] {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      padding: 12px 16px;
      outline: none;
      height: 46px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-left: 16px;
    }

    .pwd-row {
      display: flex;
      align-items: center;
    }
    .pwd-row input { flex: 1; }
    .toggle-btn {
      background: none;
      border: none;
      color: var(--sub);
      font-size: 13px;
      padding: 0 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    #execBtn {
      display: block;
      width: 100%;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 600;
      padding: 14px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: opacity 0.2s;
    }
    #execBtn:disabled { opacity: 0.4; cursor: default; }
    #execBtn:active:not(:disabled) { opacity: 0.85; }

    #errorBox {
      display: none;
      background: #fff2f2;
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--red);
      font-size: 14px;
      margin-bottom: 12px;
    }
    @media (prefers-color-scheme: dark) {
      #errorBox { background: #2d1a1a; }
    }

    #outputSection { display: none; }
    #outputText {
      color: var(--sub);
      word-break: break-all;
      user-select: all;
      -webkit-user-select: all;
    }
    #copyBtn {
      display: block;
      width: calc(100% - 32px);
      margin: 0 16px 14px;
      background: var(--bg);
      border: none;
      border-radius: 8px;
      color: var(--blue);
      font-size: 15px;
      font-weight: 500;
      padding: 16px;
      cursor: pointer;
    }
    #copyBtn:active { opacity: 0.7; }
  </style>
</head>
<body>
  <h1>AES 加解密工具</h1>
  <p class="subtitle">PBKDF2-SHA256 · AES-256-GCM</p>

  <!-- 模式选择 -->
  <div class="card">
    <div class="seg">
      <button id="btnEncrypt" onclick="setMode('encrypt')">加密</button>
      <button class="active" id="btnDecrypt" onclick="setMode('decrypt')">解密</button>
    </div>
  </div>

  <!-- 输入内容 -->
  <div class="card">
    <div class="card-label" id="inputLabel">待加密内容</div>
    <input type="text" id="inputText" placeholder="请输入内容…" autocorrect="off" autocapitalize="none" spellcheck="false">
  </div>

  <!-- 密钥 -->
  <div class="card">
    <div class="card-label">主密钥</div>
    <div class="pwd-row">
      <input type="password" id="password" placeholder="请输入主密钥" autocomplete="off">
      <button class="toggle-btn" onclick="togglePwd('password', this)">显示</button>
    </div>
  </div>

  <!-- 执行按钮 -->
  <button id="execBtn" onclick="execute()">加密</button>

  <!-- 错误 -->
  <div id="errorBox"></div>

  <!-- 输出 -->
  <div id="outputSection">
    <div class="card">
      <div class="card-label" id="outputLabel">加密结果</div>
      <input type="text" id="outputText" readonly>
    </div>
    <button id="copyBtn" onclick="copyResult()">复制结果</button>
  </div>

  <script>
    let mode = 'decrypt';

    function setMode(m) {
      mode = m;
      document.getElementById('btnEncrypt').className = m === 'encrypt' ? 'active' : '';
      document.getElementById('btnDecrypt').className = m === 'decrypt' ? 'active' : '';
      document.getElementById('inputLabel').textContent = m === 'encrypt' ? '待加密内容' : '待解密密文';
      document.getElementById('outputLabel').textContent = m === 'encrypt' ? '加密结果' : '解密结果';
      document.getElementById('execBtn').textContent = m === 'encrypt' ? '加密' : '解密';
      clearOutput();
    }

    function togglePwd(id, btn) {
      const el = document.getElementById(id);
      if (el.type === 'password') { el.type = 'text'; btn.textContent = '隐藏'; }
      else { el.type = 'password'; btn.textContent = '显示'; }
    }

    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.textContent = msg;
      box.style.display = 'block';
    }

    function clearOutput() {
      document.getElementById('errorBox').style.display = 'none';
      document.getElementById('outputSection').style.display = 'none';
      document.getElementById('outputText').value = '';
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !document.getElementById('execBtn').disabled) execute();
    });

    // 初始化为解密模式
    setMode('decrypt');

    async function execute() {
      clearOutput();
      const input = document.getElementById('inputText').value.trim();
      const pwd = document.getElementById('password').value;
      if (!input) return showError('请输入内容');
      if (!pwd) return showError('请输入主密钥');

      const btn = document.getElementById('execBtn');
      btn.disabled = true;
      btn.textContent = '处理中…';

      try {
        let result;
        if (mode === 'encrypt') {
          result = await aesEncrypt(input, pwd);
        } else {
          result = await aesDecrypt(input, pwd);
        }
        document.getElementById('outputText').value = result;
        document.getElementById('outputSection').style.display = 'block';
      } catch (e) {
        showError(e.message || '操作失败，请检查输入');
      } finally {
        btn.disabled = false;
        btn.textContent = mode === 'encrypt' ? '加密' : '解密';
      }
    }

    async function copyResult() {
      const text = document.getElementById('outputText').value;
      try {
        await navigator.clipboard.writeText(text);
        const btn = document.getElementById('copyBtn');
        btn.textContent = '✓ 已复制';
        setTimeout(() => { btn.textContent = '复制结果'; }, 2000);
      } catch {
        document.getElementById('outputText').select();
      }
    }

    // ─── 密钥派生：PBKDF2-SHA256，600,000 次迭代 ────────────────────────
    async function deriveKey(password, salt) {
      const keyMaterial = await crypto.subtle.importKey(
        'raw',
        new TextEncoder().encode(password),
        'PBKDF2',
        false,
        ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 600000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
      );
    }

    // ─── 加密：输出 Base64(salt[16] + iv[12] + ciphertext+tag) ──────────
    async function aesEncrypt(plaintext, password) {
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv   = crypto.getRandomValues(new Uint8Array(12));
      const key  = await deriveKey(password, salt);

      const cipherBuf = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        new TextEncoder().encode(plaintext)
      );

      const out = new Uint8Array(16 + 12 + cipherBuf.byteLength);
      out.set(salt, 0);
      out.set(iv, 16);
      out.set(new Uint8Array(cipherBuf), 28);

      return btoa(String.fromCharCode(...out));
    }

    // ─── 解密：从 Base64 中拆出 salt/iv，还原密钥后解密 ─────────────────
    async function aesDecrypt(ciphertext, password) {
      let bytes;
      try {
        bytes = Uint8Array.from(atob(ciphertext), c => c.charCodeAt(0));
      } catch {
        throw new Error('Base64 解码失败，密文格式不正确');
      }

      // 最小长度：salt(16) + iv(12) + GCM tag(16) = 44 字节
      if (bytes.length < 44) {
        throw new Error('密文长度不合法');
      }

      const salt = bytes.slice(0, 16);
      const iv   = bytes.slice(16, 28);
      const data = bytes.slice(28);
      const key  = await deriveKey(password, salt);

      try {
        const plainBuf = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          key,
          data
        );
        return new TextDecoder().decode(plainBuf);
      } catch {
        throw new Error('解密失败：密钥错误或密文已损坏');
      }
    }
  </script>
</body>
</html>
